<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal New Tab</title>
    <link rel="icon" href="svg/favicon-dark.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" href="svg/favicon-light.svg" media="(prefers-color-scheme: dark)">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@100;300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --link: #ddd;
            --underline: #888;
            --muted: #777;
        }

        [data-theme="light"] {
            --bg: #f8f9fa;
            --text: #111;
            --link: #333;
            --underline: #666;
            --muted: #888;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: background 0.4s, color 0.4s;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 50px 20px 30px;
            text-align: center;
            flex-shrink: 0;
        }

        .day {
            font-family: 'Playfair Display', serif;
            font-size: 5.2rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: -1.5px;
            line-height: 0.95;
        }

        .date {
            font-family: 'Montserrat', sans-serif;
            font-weight: 100;
            font-size: 2.4rem;
            margin: 12px 0 0;
            opacity: 0.82;
            letter-spacing: 3px;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1000px;
            padding: 20px;
        }

        .link-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .link-item {
            position: relative;
            font-size: 1.45rem;
            font-weight: 300;
            color: var(--link);
            text-decoration: none;
            transition: color 0.25s;
        }

        .link-item:hover {
            color: var(--text);
        }

        .link-item::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 100%;
            height: 3px;
            background: var(--underline);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .link-item:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .add-btn,
        .edit-btn {
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s, color 0.2s;
            user-select: none;
        }

        .add-btn:hover,
        .edit-btn:hover {
            opacity: 0.9;
            color: var(--text);
        }

        .add-btn {
            font-size: 1.8rem;
            line-height: 1;
        }

        .edit-btn {
            font-size: 1.1rem;
            opacity: 0;
        }

        .link-wrapper:hover .edit-btn {
            opacity: 0.6;
        }

        .edit-btn:hover {
            opacity: 1;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.14);
            padding: 10px 14px;
            border-radius: 12px;
            /* almost square – small radius */
            cursor: pointer;
            font-size: 0.95rem;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        [data-theme="light"] .btn {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.12);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        [data-theme="light"] .btn:hover {
            background: rgba(0, 0, 0, 0.12);
        }

        /* Modal (same as before) */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: var(--bg);
            padding: 32px;
            border-radius: 32px;
            width: 380px;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] .modal-content {
            border-color: rgba(0, 0, 0, 0.1);
        }

        .modal h2 {
            margin: 0 0 20px;
            font-size: 1.4rem;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 1rem;
        }

        [data-theme="light"] .modal input {
            border-color: rgba(0, 0, 0, 0.2);
            background: rgba(0, 0, 0, 0.03);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--text);
            border-radius: 50%;
            pointer-events: none;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% {
                opacity: 0.9;
                transform: translate(0, 0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0.2);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="day"></div>
        <div class="date"></div>
    </header>

    <main>
        <div class="links"></div>
    </main>

    <div class="controls">
        <button class="btn" id="toggleTheme">Light Mode</button>
    </div>

    <!-- Modal (used for both add and edit) -->
    <div class="modal" id="linkModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Link</h2>
            <input type="text" id="linkName" placeholder="Name (e.g. Twitter)" autocomplete="off">
            <input type="url" id="linkUrl" placeholder="https://x.com" autocomplete="off">
            <div class="modal-buttons">
                <button class="btn" id="cancelBtn">Cancel</button>
                <button class="btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ── Theme toggle ────────────────────────────────────────
        const toggleBtn = document.getElementById('toggleTheme');
        const html = document.documentElement;

        function setTheme(theme) {
            html.dataset.theme = theme;
            toggleBtn.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        toggleBtn.addEventListener('click', () => {
            setTheme(html.dataset.theme === 'dark' ? 'light' : 'dark');
        });

        // ── Date ────────────────────────────────────────────────
        const now = new Date();
        document.querySelector('.day').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.querySelector('.date').textContent = `${now.getDate()}.${now.getMonth() + 1}.${now.getFullYear()}`;

        // ── Links ───────────────────────────────────────────────
        const linksContainer = document.querySelector('.links');
        let links = JSON.parse(localStorage.getItem('customLinks')) || [
            { name: 'ChatGPT', url: 'https://chatgpt.com' },
            { name: 'Cosmos', url: 'https://cosmos.network' },
            { name: 'Facebook', url: 'https://facebook.com' },
            { name: 'Gemini', url: 'https://gemini.google.com' },
            { name: 'Github', url: 'https://github.com' },
            { name: 'Grok', url: 'https://grok.x.ai' },
            { name: 'iMathEQ', url: 'https://www.imatheq.com/imatheq/com/imatheq/math-equation-editor-latex-mathml.html' },
            { name: 'Pinterest', url: 'https://pinterest.com' },
            { name: 'Youtube', url: 'https://youtube.com' },
            { name: 'Zibrary', url: 'https://z-library.sk/' }
        ];

        links.sort((a, b) => a.name.localeCompare(b.name));

        let editingIndex = -1; // -1 = adding new, >=0 = editing that index

        function renderLinks() {
            linksContainer.innerHTML = '';
            links.forEach((link, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'link-wrapper';

                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'link-item';
                a.textContent = link.name;
                a.target = '_blank';

                const editBtn = document.createElement('span');
                editBtn.className = 'edit-btn';
                editBtn.textContent = '✎';
                editBtn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    openEditModal(i);
                };

                wrapper.appendChild(a);
                wrapper.appendChild(editBtn);
                linksContainer.appendChild(wrapper);
            });

            // Add the + button after the last link
            const addWrapper = document.createElement('div');
            addWrapper.className = 'link-wrapper';
            const addBtn = document.createElement('span');
            addBtn.className = 'add-btn';
            addBtn.textContent = '+';
            addBtn.onclick = () => openAddModal();
            addWrapper.appendChild(addBtn);
            linksContainer.appendChild(addWrapper);
        }

        renderLinks();

        // ── Modal logic (add / edit) ────────────────────────────
        const modal = document.getElementById('linkModal');
        const modalTitle = document.getElementById('modalTitle');
        const nameInput = document.getElementById('linkName');
        const urlInput = document.getElementById('linkUrl');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');

        function openAddModal() {
            editingIndex = -1;
            modalTitle.textContent = 'Add New Link';
            nameInput.value = '';
            urlInput.value = '';
            modal.style.display = 'flex';
            nameInput.focus();
        }

        function openEditModal(index) {
            editingIndex = index;
            const link = links[index];
            modalTitle.textContent = 'Edit Link';
            nameInput.value = link.name;
            urlInput.value = link.url;
            modal.style.display = 'flex';
            nameInput.focus();
        }

        function saveLink() {
            const name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!name || !url) return;

            if (!url.startsWith('http')) url = 'https://' + url;

            if (editingIndex === -1) {
                // Add new
                links.push({ name, url });
            } else {
                // Update existing
                links[editingIndex] = { name, url };
            }

            links.sort((a, b) => a.name.localeCompare(b.name));

            localStorage.setItem('customLinks', JSON.stringify(links));
            renderLinks();
            modal.style.display = 'none';
        }

        cancelBtn.onclick = () => {
            modal.style.display = 'none';
            nameInput.value = urlInput.value = '';
        };

        saveBtn.onclick = saveLink;

        modal.onclick = e => {
            if (e.target === modal) {
                modal.style.display = 'none';
                nameInput.value = urlInput.value = '';
            }
        };

        // ── Fireworks on link click ─────────────────────────────
        document.addEventListener('click', e => {
            const link = e.target.closest('.link-item');
            if (link) {
                e.preventDefault();
                const url = link.href;

                for (let i = 0; i < 24; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = e.clientX + 'px';
                    p.style.top = e.clientY + 'px';
                    p.style.setProperty('--dx', (Math.random() * 260 - 130) + 'px');
                    p.style.setProperty('--dy', (Math.random() * 260 - 130) + 'px');
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 700);
                }

                setTimeout(() => window.open(url, '_blank'), 350);
            }
        });

        // ── Antigravity Burst Particles ────────────────────
        const canvas = document.createElement('canvas');
        canvas.id = 'bg-canvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.zIndex = '-1';
        canvas.style.pointerEvents = 'none';
        document.body.prepend(canvas);

        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        
        const colors = [
            '#4285F4', // Google Blue
            '#EA4335', // Google Red
            '#FBBC05', // Google Yellow
            '#34A853', // Google Green
            '#A142F4', // Purple
            '#F442A4'  // Pink
        ];

        // Adjust particle count based on screen size
        const calculateParticles = () => Math.min(Math.floor(window.innerWidth * window.innerHeight / 4000), 300);
        let numberOfParticles = calculateParticles();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            numberOfParticles = calculateParticles();
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);
        // Initial sizing
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.reset();
                // Random start distance to populate the screen initially
                this.distance = Math.random() * Math.max(canvas.width, canvas.height);
            }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * 100; // spawn near center
                this.speed = Math.random() * 0.8 + 0.2; // slow outwards drift
                this.length = Math.random() * 6 + 2; // short dashes
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.thickness = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.6 + 0.4;
            }
            update() {
                this.distance += this.speed;
                
                // Fade out as it reaches the edges
                const maxDist = Math.max(canvas.width, canvas.height) / 1.2;
                if (this.distance > maxDist) {
                    this.opacity -= 0.01;
                    if (this.opacity <= 0) {
                        this.reset();
                    }
                }
                
                this.x = canvas.width / 2 + Math.cos(this.angle) * this.distance;
                this.y = canvas.height / 2 + Math.sin(this.angle) * this.distance;
            }
            draw() {
                ctx.beginPath();
                ctx.globalAlpha = this.opacity;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.thickness;
                ctx.lineCap = 'round';
                
                const tailX = canvas.width / 2 + Math.cos(this.angle) * (this.distance - this.length);
                const tailY = canvas.height / 2 + Math.sin(this.angle) * (this.distance - this.length);
                
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
</body>

</html>
